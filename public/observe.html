<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Syndicate — Observer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030712; color: #e5e7eb;
      font-family: monospace; font-size: 12px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────────────────── */
    #top-bar {
      background: #0a0d14; border-bottom: 1px solid #1e2a3a;
      height: 38px; display: flex; align-items: center;
      padding: 0 16px; gap: 14px; flex-shrink: 0; z-index: 20;
    }
    #top-bar h1 { color: #00f5c4; font-size: 12px; letter-spacing: 3px; white-space: nowrap; }
    .tb-sep { color: #1e2a3a; }
    #status-val { font-size: 10px; letter-spacing: 1px; }
    #tick-val { color: #9ca3af; font-size: 10px; white-space: nowrap; }
    #law-display { font-size: 10px; color: #fbbf24; letter-spacing: 1px; white-space: nowrap; display: none; }
    #law-sep { display: none; }
    #last-update { margin-left: auto; color: #374151; font-size: 10px; white-space: nowrap; }
    #live-dot { color: #22c55e; font-size: 10px; }
    #zoom-hint { color: #374151; font-size: 9px; white-space: nowrap; }

    /* ── Map area ────────────────────────────────────────────────────── */
    #map-area { flex: 1; position: relative; overflow: hidden; }
    #city-svg { width: 100%; height: 100%; cursor: grab; display: block; }
    #city-svg.dragging { cursor: grabbing; }

    /* ── Right panel (leaderboard + district popup stacked) ─────────── */
    #right-panel {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      width: 210px; display: flex; flex-direction: column; gap: 8px;
      max-height: calc(100% - 24px);
    }
    .panel-box {
      background: rgba(10, 13, 20, 0.82);
      backdrop-filter: blur(6px);
      border: 1px solid #1e2a3a; border-radius: 8px;
      overflow: hidden; flex-shrink: 0;
    }

    /* Leaderboard */
    #lb-title {
      padding: 8px 12px 6px;
      color: #4b5563; font-size: 9px; letter-spacing: 2px;
      border-bottom: 1px solid #1e2a3a;
    }
    #lb-list { padding: 4px 0; }
    .lb-row {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px;
    }
    .lb-rank { color: #374151; font-size: 9px; min-width: 14px; }
    .lb-swatch { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
    .lb-name { flex: 1; font-size: 10px; color: #e5e7eb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-right { text-align: right; flex-shrink: 0; }
    .lb-val { font-size: 10px; color: #ffd700; display: block; }
    .lb-districts { font-size: 9px; color: #4b5563; display: block; }

    /* District popup */
    #district-popup { display: none; }
    #district-popup.visible { display: block; }
    #dp-header {
      padding: 8px 12px 6px; border-bottom: 1px solid #1e2a3a;
      display: flex; align-items: center; justify-content: space-between;
    }
    #dp-name { font-size: 11px; color: #e5e7eb; letter-spacing: 1px; }
    #dp-close {
      color: #374151; font-size: 14px; cursor: pointer; line-height: 1;
      background: none; border: none; padding: 0 0 0 8px; color: #4b5563;
    }
    #dp-close:hover { color: #9ca3af; }
    #dp-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
    .dp-section-label { font-size: 9px; color: #4b5563; letter-spacing: 2px; margin-bottom: 4px; }
    .dp-type-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #9ca3af; }
    .dp-owner-row { display: flex; align-items: center; gap: 6px; font-size: 10px; }
    .dp-owner-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .dp-owner-name { color: #e5e7eb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dp-res-grid { display: grid; grid-template-columns: 1fr auto; gap: 2px 8px; font-size: 10px; }
    .dp-res-label { color: #6b7280; }
    .dp-res-val { color: #00f5c4; text-align: right; }
    .dp-res-rep { color: #ef4444; text-align: right; }
    .dp-fort-row { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #6b7280; }
    .dp-fort-pips { display: flex; gap: 2px; }
    .dp-pip { width: 8px; height: 8px; border-radius: 1px; }
    .dp-pip.filled { background: #ffd700; }
    .dp-pip.empty { background: #1e2a3a; }

    /* ── Pending / ended overlay ─────────────────────────────────────── */
    #map-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(3,7,18,0.85);
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; font-family: monospace;
      text-align: center; padding: 24px;
    }
    #map-overlay.visible { display: flex; }
  </style>
</head>
<body>

<div id="top-bar">
  <h1>NEON SYNDICATE</h1>
  <span class="tb-sep">|</span>
  <span id="status-val">–</span>
  <span class="tb-sep">|</span>
  <span id="tick-val">TICK –</span>
  <span id="law-sep" class="tb-sep">|</span>
  <span id="law-display">–</span>
  <span class="tb-sep">|</span>
  <span id="zoom-hint">scroll to zoom · drag to pan</span>
  <span id="last-update">–</span>
  <span id="live-dot">●</span>
</div>

<div id="map-area">
  <svg id="city-svg" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid meet"></svg>

  <div id="right-panel">
    <div class="panel-box" id="leaderboard">
      <div id="lb-title">STANDINGS</div>
      <div id="lb-list"></div>
    </div>

    <div class="panel-box" id="district-popup">
      <div id="dp-header">
        <span id="dp-name"></span>
        <button id="dp-close" title="Close">✕</button>
      </div>
      <div id="dp-body"></div>
    </div>
  </div>

  <div id="map-overlay"></div>
</div>

<script>
const CORP_COLORS = ['#00f5c4','#ff4d64','#ffd700','#a855f7','#3b82f6','#f97316','#10b981','#ec4899'];
const corpColorMap = {};

const DISTRICT_POLYGONS = {
  "Meridian Park":     [[740,938],[507,788],[393,707],[5,998],[5,1022],[665,1021],[665,970]],
  "The Sprawl":        [[393,707],[223,568],[1,686],[5,998]],
  "Harbor Front":      [[223,568],[288,531],[214,460],[173,482],[128,455],[96,472],[54,436],[8,462],[39,491],[0,506],[1,686]],
  "Signal Flats":      [[288,531],[450,448],[489,534],[549,579],[393,707],[223,568]],
  "Ashburn Alley":     [[549,579],[648,642],[507,788],[393,707]],
  "Eastport Terminal": [[1534,725],[1336,714],[1257,709],[1163,717],[1003,728],[994,1022],[1074,1019],[1073,897],[1173,873],[1319,877],[1490,1022],[1535,1021]],
  "Portside":          [[994,1022],[740,938],[745,680],[750,605],[1005,608],[1003,728],[1003,728]],
  "Ember Ward":        [[648,642],[745,680],[740,938],[507,788]],
  "Data Haven":        [[450,448],[628,354],[673,427],[791,477],[753,520],[750,605],[750,605],[745,680],[648,642],[549,579],[489,534]],
  "Northgate Hub":     [[214,460],[288,531],[450,448],[423,346],[550,287],[483,225],[567,189],[567,164],[543,170],[477,153],[454,161],[514,187],[468,204],[405,233],[345,215],[315,225],[386,257],[376,265],[348,252],[321,268],[392,307],[393,341],[370,356],[293,314],[266,331],[352,381],[331,394],[260,351],[241,363],[306,406]],
  "Neon Row":          [[791,477],[849,408],[972,429],[1009,432],[1005,608],[750,605],[753,520]],
  "Voltaic Fields":    [[1009,432],[1093,432],[1256,434],[1261,614],[1261,614],[1257,709],[1163,717],[1003,728],[1005,608]],
  "The Fringe":        [[1256,434],[1405,433],[1535,434],[1534,725],[1336,714],[1257,709],[1261,614],[1261,614]],
  "The Canopy":        [[1093,432],[1095,282],[1329,286],[1384,288],[1405,433],[1256,434]],
  "Gridlock":          [[1535,434],[1405,433],[1384,288],[1378,238],[1535,240]],
  "The Undercroft":    [[849,408],[935,277],[1004,285],[1095,282],[1093,432],[1009,432],[972,429]],
  "Nexus Core":        [[935,277],[849,408],[791,477],[673,427],[628,354],[787,266],[861,261]],
  "Foundry District":  [[543,170],[567,164],[723,163],[773,191],[612,263],[550,287],[483,225],[567,189]],
  "Silk Road":         [[423,346],[550,287],[612,263],[628,354],[450,448]],
  "Blacksite":         [[1535,240],[1536,161],[1317,154],[1329,286],[1384,288],[1378,238]],
  "Chrome Quarter":    [[612,263],[628,354],[787,266],[861,261],[861,261],[773,191]],
  "Capitol Hill":      [[723,163],[897,153],[902,135],[1010,135],[1012,212],[948,200],[861,261],[773,191]],
  "Veritas Square":    [[1010,135],[1102,140],[1095,282],[1004,285],[935,277],[861,261],[861,261],[948,200],[1012,212]],
  "Ironworks":         [[1317,154],[1102,140],[1095,282],[1329,286]],
};

const DISTRICT_ICONS = {
  power_grid:'⚡', financial_hub:'💰', labor_zone:'👷',
  data_center:'🔍', black_market:'🎭', government_quarter:'🏛'
};

const PRODUCTION = {
  data_center:        { intelligence: 3, credits: 1 },
  power_grid:         { energy: 2, workforce: 1, credits: 1 },
  labor_zone:         { workforce: 3, credits: 1 },
  financial_hub:      { credits: 4, energy: 1 },
  black_market:       { influence: 2, credits: 2, reputation: -1 },
  government_quarter: { political_power: 2, influence: 1, credits: 2, reputation: 1 },
};

const RES_LABELS = {
  credits: 'Credits', energy: 'Energy', workforce: 'Workforce',
  intelligence: 'Intelligence', influence: 'Influence',
  political_power: 'Political Power', reputation: 'Reputation',
};

const TYPE_LABELS = {
  power_grid: 'Power Grid', financial_hub: 'Financial Hub', labor_zone: 'Labor Zone',
  data_center: 'Data Center', black_market: 'Black Market', government_quarter: 'Government Quarter',
};

let worldData = null;
let selectedDistrictName = null;

// ── Pan / zoom state ───────────────────────────────────────────────────────
const SVG_W = 1536, SVG_H = 1024;
let vb = { x: 0, y: 0, w: SVG_W, h: SVG_H };
const MIN_ZOOM = 200, MAX_ZOOM = SVG_W * 3;

const svg = document.getElementById('city-svg');

function applyViewBox() {
  svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
}

// Scroll to zoom, centered on mouse
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.12 : 1 / 1.12;
  const newW = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, vb.w * factor));
  const newH = newW * SVG_H / SVG_W;
  const rect = svg.getBoundingClientRect();
  // Map mouse position to SVG coords
  const mx = vb.x + (e.clientX - rect.left) / rect.width  * vb.w;
  const my = vb.y + (e.clientY - rect.top)  / rect.height * vb.h;
  // Keep mouse point fixed
  vb.x = mx - (e.clientX - rect.left) / rect.width  * newW;
  vb.y = my - (e.clientY - rect.top)  / rect.height * newH;
  vb.w = newW;
  vb.h = newH;
  applyViewBox();
}, { passive: false });

// Drag to pan
let drag = null;
let dragMoved = false;
svg.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  drag = { cx: e.clientX, cy: e.clientY, bx: vb.x, by: vb.y };
  dragMoved = false;
  svg.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx = e.clientX - drag.cx, dy = e.clientY - drag.cy;
  if (Math.hypot(dx, dy) > 4) dragMoved = true;
  const rect = svg.getBoundingClientRect();
  vb.x = drag.bx - dx * vb.w / rect.width;
  vb.y = drag.by - dy * vb.h / rect.height;
  applyViewBox();
});
window.addEventListener('mouseup', e => {
  if (drag && !dragMoved && e.target === svg) {
    // Clicked blank map area — deselect district
    selectedDistrictName = null;
    renderMap();
    renderDistrictPopup();
  }
  drag = null;
  dragMoved = false;
  svg.classList.remove('dragging');
});

// Touch: single-finger pan, two-finger pinch zoom
let touch = null;
svg.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    touch = { type: 'pan', cx: t.clientX, cy: t.clientY, bx: vb.x, by: vb.y };
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touch = { type: 'pinch', dist: Math.hypot(dx, dy), bw: vb.w, bh: vb.h,
      midX: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      midY: (e.touches[0].clientY + e.touches[1].clientY) / 2, bx: vb.x, by: vb.y };
  }
}, { passive: true });
svg.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch) return;
  const rect = svg.getBoundingClientRect();
  if (touch.type === 'pan' && e.touches.length === 1) {
    const t = e.touches[0];
    vb.x = touch.bx - (t.clientX - touch.cx) * vb.w / rect.width;
    vb.y = touch.by - (t.clientY - touch.cy) * vb.h / rect.height;
    applyViewBox();
  } else if (touch.type === 'pinch' && e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const factor = touch.dist / dist;
    const newW = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, touch.bw * factor));
    const newH = newW * SVG_H / SVG_W;
    const mx = touch.bx + touch.midX / rect.width  * touch.bw;
    const my = touch.by + touch.midY / rect.height * touch.bh;
    vb.x = mx - touch.midX / rect.width  * newW;
    vb.y = my - touch.midY / rect.height * newH;
    vb.w = newW; vb.h = newH;
    applyViewBox();
  }
}, { passive: false });
svg.addEventListener('touchend', () => { touch = null; }, { passive: true });

// ── Rendering ──────────────────────────────────────────────────────────────
function pointsStr(coords) {
  return coords.map(([x,y]) => `${x},${y}`).join(' ');
}
function centroid(coords) {
  const x = coords.reduce((s,[cx]) => s+cx, 0) / coords.length;
  const y = coords.reduce((s,[,cy]) => s+cy, 0) / coords.length;
  return [Math.round(x), Math.round(y)];
}

function renderMap() {
  const districts = worldData?.districts || [];
  svg.innerHTML = '';

  const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
  img.setAttribute('href', '/city-map.png');
  img.setAttribute('x', '0'); img.setAttribute('y', '0');
  img.setAttribute('width', SVG_W); img.setAttribute('height', SVG_H);
  img.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  svg.appendChild(img);

  districts.forEach(d => {
    const coords = DISTRICT_POLYGONS[d.name];
    if (!coords) return;
    const isSelected = d.name === selectedDistrictName;
    const color = d.ownerId ? (corpColorMap[d.ownerId] || '#888') : '#7aaec8';
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pointsStr(coords));
    poly.setAttribute('fill', color);
    poly.setAttribute('fill-opacity', isSelected ? 0.55 : d.ownerId ? 0.35 : 0.07);
    poly.setAttribute('stroke', isSelected ? color : 'none');
    poly.setAttribute('stroke-width', isSelected ? '2' : '0');
    poly.setAttribute('stroke-opacity', '0.9');
    poly.style.cursor = 'pointer';
    poly.addEventListener('click', (e) => {
      e.stopPropagation(); // don't let it bubble to SVG pan handler
      selectedDistrictName = isSelected ? null : d.name;
      renderMap();
      renderDistrictPopup();
    });
    svg.appendChild(poly);

    const [cx, cy] = centroid(coords);
    const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    icon.setAttribute('x', cx); icon.setAttribute('y', cy + 5);
    icon.setAttribute('text-anchor', 'middle');
    icon.setAttribute('font-size', '14');
    icon.setAttribute('pointer-events', 'none');
    icon.textContent = DISTRICT_ICONS[d.type] || '?';
    svg.appendChild(icon);
  });

  const edgeMap = new Map();
  districts.forEach(d => {
    const coords = DISTRICT_POLYGONS[d.name];
    if (!coords) return;
    for (let i = 0; i < coords.length; i++) {
      const [x1,y1] = coords[i], [x2,y2] = coords[(i+1) % coords.length];
      const fwd = x1 < x2 || (x1 === x2 && y1 < y2);
      const key = fwd ? `${x1},${y1}|${x2},${y2}` : `${x2},${y2}|${x1},${y1}`;
      if (!edgeMap.has(key)) edgeMap.set(key, { x1:fwd?x1:x2, y1:fwd?y1:y2, x2:fwd?x2:x1, y2:fwd?y2:y1, ds:[] });
      edgeMap.get(key).ds.push(d);
    }
  });
  edgeMap.forEach(({ x1,y1,x2,y2,ds }) => {
    const owned = ds.find(d => d.ownerId);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke', owned ? (corpColorMap[owned.ownerId] || '#888') : '#6a9ab8');
    line.setAttribute('stroke-width', '1.5');
    if (!ds.every(d => d.ownerId)) line.setAttribute('stroke-dasharray', '6 4');
    line.setAttribute('pointer-events', 'none');
    svg.appendChild(line);
  });
}

function renderDistrictPopup() {
  const popup = document.getElementById('district-popup');
  if (!selectedDistrictName || !worldData) {
    popup.classList.remove('visible'); return;
  }
  const d = worldData.districts.find(x => x.name === selectedDistrictName);
  if (!d) { popup.classList.remove('visible'); return; }

  document.getElementById('dp-name').textContent = d.name.toUpperCase();

  const owner = d.ownerId ? worldData.corporations.find(c => c.id === d.ownerId) : null;
  const ownerColor = owner ? (corpColorMap[owner.id] || '#888') : null;
  const prod = PRODUCTION[d.type] || {};

  const resRows = Object.entries(prod).map(([k, v]) => {
    const label = RES_LABELS[k] || k;
    const isRep = k === 'reputation';
    const sign = v > 0 ? '+' : '';
    const cls = isRep ? (v > 0 ? 'dp-res-val' : 'dp-res-rep') : 'dp-res-val';
    return `<span class="dp-res-label">${label}</span><span class="${cls}">${sign}${v}/tick</span>`;
  }).join('');

  const maxFort = 5;
  const fortLevel = d.fortificationLevel || 0;
  const pips = Array.from({ length: maxFort }, (_, i) =>
    `<span class="dp-pip ${i < fortLevel ? 'filled' : 'empty'}"></span>`
  ).join('');

  document.getElementById('dp-body').innerHTML = `
    <div>
      <div class="dp-section-label">TYPE</div>
      <div class="dp-type-row">
        <span>${DISTRICT_ICONS[d.type] || '?'}</span>
        <span>${TYPE_LABELS[d.type] || d.type}</span>
      </div>
    </div>
    <div>
      <div class="dp-section-label">OWNER</div>
      ${owner
        ? `<div class="dp-owner-row">
             <span class="dp-owner-swatch" style="background:${ownerColor}"></span>
             <span class="dp-owner-name">${esc(owner.name)}</span>
           </div>`
        : `<div style="color:#374151;font-size:10px">Unclaimed</div>`}
    </div>
    <div>
      <div class="dp-section-label">PRODUCTION / TICK</div>
      <div class="dp-res-grid">${resRows}</div>
    </div>
    <div>
      <div class="dp-section-label">FORTIFICATION</div>
      <div class="dp-fort-row">
        <div class="dp-fort-pips">${pips}</div>
        <span>Level ${fortLevel}</span>
      </div>
    </div>`;

  popup.classList.add('visible');
}

document.getElementById('dp-close').addEventListener('click', () => {
  selectedDistrictName = null;
  renderMap();
  renderDistrictPopup();
});

function renderLeaderboard() {
  if (!worldData) return;
  const corps = [...(worldData.corporations || [])]
    .sort((a, b) => (b.valuation || 0) - (a.valuation || 0));

  const list = document.getElementById('lb-list');
  if (!corps.length) {
    list.innerHTML = '<div style="padding:8px 12px;color:#374151;font-size:9px">No corps registered</div>';
    return;
  }

  list.innerHTML = corps.map((c, i) => {
    const color = corpColorMap[c.id] || '#888';
    const repColor = c.reputation >= 75 ? '#4ade80'
      : c.reputation >= 40 ? '#9ca3af'
      : c.reputation >= 15 ? '#f97316' : '#ef4444';
    return `<div class="lb-row">
      <span class="lb-rank">#${i+1}</span>
      <span class="lb-swatch" style="background:${color}"></span>
      <span class="lb-name">${esc(c.name)}</span>
      <span class="lb-right">
        <span class="lb-val">${(c.valuation||0).toLocaleString()}</span>
        <span class="lb-districts" style="color:${repColor}">${c.districtCount ?? '–'}d · ${c.reputationLabel || ''}</span>
      </span>
    </div>`;
  }).join('');
}

function renderOverlay() {
  const overlay = document.getElementById('map-overlay');
  if (!worldData || worldData.status === 'active' || worldData.status === 'paused') {
    overlay.classList.remove('visible'); return;
  }
  if (worldData.status === 'pending') {
    overlay.innerHTML =
      `<div style="background:rgba(10,13,20,0.85);border:1px solid #fbbf24;border-radius:6px;padding:8px 16px">
        <span style="color:#fbbf24;font-size:11px;letter-spacing:1px">⏳ SEASON PENDING — Waiting to start</span>
      </div>`;
    overlay.style.alignItems = 'flex-start';
    overlay.style.paddingTop = '12px';
    overlay.classList.add('visible'); return;
  }
  if (worldData.status === 'ended') {
    const sorted = [...(worldData.corporations || [])].sort((a,b) => (b.valuation||0)-(a.valuation||0));
    const rows = sorted.map((c,i) =>
      `<div style="display:flex;gap:10px;align-items:baseline;padding:4px 0;font-size:12px">
        <span style="color:#6b7280;min-width:20px">#${i+1}</span>
        <span style="flex:1;color:#e5e7eb">${esc(c.name)}</span>
        <span style="color:#ffd700">VAL ${(c.valuation||0).toLocaleString()}</span>
      </div>`
    ).join('');
    overlay.innerHTML =
      `<div style="background:rgba(10,13,20,0.92);border:1px solid #00f5c4;border-radius:8px;padding:24px;max-width:400px">
        <div style="font-size:16px;color:#00f5c4;letter-spacing:2px;margin-bottom:16px">SEASON COMPLETE</div>
        ${rows}
      </div>`;
    overlay.style.alignItems = 'center';
    overlay.style.paddingTop = '';
    overlay.classList.add('visible');
  }
}

function updateTopBar() {
  if (!worldData) return;
  const s = worldData.status;
  const statusEl = document.getElementById('status-val');
  statusEl.textContent = s ? s.toUpperCase() : '–';
  statusEl.style.color = s === 'active' ? '#00f5c4' : s === 'pending' ? '#fbbf24' : s === 'ended' ? '#ef4444' : '#6b7280';
  document.getElementById('tick-val').textContent = `TICK ${worldData.tick ?? '–'}`;

  const lawEl = document.getElementById('law-display');
  const lawSep = document.getElementById('law-sep');
  const law = worldData.activeLaw;
  if (law) {
    lawEl.textContent = `⚖ ${law.name.toUpperCase()}`;
    lawEl.style.display = '';
    lawSep.style.display = '';
  } else {
    lawEl.style.display = 'none';
    lawSep.style.display = 'none';
  }
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function poll() {
  try {
    const res = await fetch('/world');
    if (!res.ok) return;
    worldData = await res.json();

    (worldData.corporations || []).forEach((c, i) => {
      if (!corpColorMap[c.id]) corpColorMap[c.id] = CORP_COLORS[i % CORP_COLORS.length];
    });

    renderMap();
    renderLeaderboard();
    renderDistrictPopup();
    renderOverlay();
    updateTopBar();
    document.getElementById('last-update').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch (_) {}
}

poll();
setInterval(poll, 10000);
</script>
</body>
</html>
