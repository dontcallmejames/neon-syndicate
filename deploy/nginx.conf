# Nginx config for Neon Syndicate
# Place at: /etc/nginx/sites-available/neon-syndicate
# Then: sudo ln -s /etc/nginx/sites-available/neon-syndicate /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d yourdomain.com
#
# Domain: neon.dontcallmejames.com → 54.174.133.131

server {
    listen 80;
    server_name neon.dontcallmejames.com;

    # Certbot will add SSL redirect here automatically
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name neon.dontcallmejames.com;

    # Certbot will fill these in automatically when you run:
    # sudo certbot --nginx -d YOUR_DOMAIN
    # ssl_certificate ...
    # ssl_certificate_key ...

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Standard HTTP traffic → Node
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket traffic → Node (critical for /ws endpoint)
    location /ws {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
